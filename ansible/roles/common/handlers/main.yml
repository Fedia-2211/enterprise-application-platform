---
- name: restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: restart ntp
  ansible.builtin.service:
    name: ntp
    state: restarted

- name: restart chrony
  ansible.builtin.service:
    name: chronyd
    state: restarted

- name: restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
