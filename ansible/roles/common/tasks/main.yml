---
# roles/common/tasks/main.yml

- name: Update all packages
  ansible.builtin.package:
    name: "*"
    state: latest
  tags: [packages]

- name: Install common packages (Ubuntu/Debian)
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - vim
      - htop
      - net-tools
      - ntp
      - fail2ban
      - ufw
      - python3-pip
      - jq
      - awscli
      - logrotate
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install EPEL repository (CentOS)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_os_family == "RedHat"

- name: Install common packages (CentOS/RHEL)
  ansible.builtin.dnf:
    name:
      - curl
      - wget
      - git
      - unzip
      - vim
      - htop
      - net-tools
      - chrony
      - fail2ban
      - firewalld
      - python3-pip
      - jq
      - logrotate
    state: present
  when: ansible_os_family == "RedHat"

- name: Install common packages (CentOS/RHEL)
  ansible.builtin.dnf:
    name:
      - curl
      - wget
      - git
      - unzip
      - vim
      - htop
      - net-tools
      - chrony
      - fail2ban
      - firewalld
      - python3-pip
      - jq
      - awscli
      - logrotate
    state: present
  when: ansible_os_family == "RedHat"

- name: Set system timezone
  community.general.timezone:
    name: "{{ system_timezone }}"

- name: Configure NTP (Ubuntu)
  ansible.builtin.lineinfile:
    path: /etc/ntp.conf
    regexp: "^server"
    line: "server {{ ntp_servers[0] }} iburst"
    state: present
  notify: restart ntp
  when: ansible_os_family == "Debian"

- name: Configure chrony (CentOS)
  ansible.builtin.lineinfile:
    path: /etc/chrony.conf
    regexp: "^server"
    line: "server {{ ntp_servers[0] }} iburst"
    state: present
  notify: restart chrony
  when: ansible_os_family == "RedHat"

# ── Create ops user ──────────────────────────────────────────────────────────
- name: Create ops group
  ansible.builtin.group:
    name: "{{ ops_user }}"
    state: present

- name: Create ops user
  ansible.builtin.user:
    name: "{{ ops_user }}"
    group: "{{ ops_user }}"
    groups: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
    shell: "{{ ops_user_shell }}"
    create_home: true
    state: present

- name: Set ops user sudoers (passwordless for ops tasks)
  ansible.builtin.copy:
    dest: /etc/sudoers.d/ops
    content: "{{ ops_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: visudo -cf %s

- name: Create .ssh directory for ops user
  ansible.builtin.file:
    path: "/home/{{ ops_user }}/.ssh"
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_user }}"
    mode: "0700"

# ── SSH Hardening ─────────────────────────────────────────────────────────────
- name: Configure sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: sshd -t -f %s
  notify: restart sshd

- name: Disable IPv6 (optional hardening)
  ansible.builtin.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

# ── Kernel Security Parameters ────────────────────────────────────────────────
- name: Apply sysctl security settings
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: "net.ipv4.tcp_syncookies",          value: "1" }
    - { key: "net.ipv4.conf.all.rp_filter",      value: "1" }
    - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { key: "net.ipv4.conf.all.send_redirects",  value: "0" }
    - { key: "net.ipv4.conf.all.log_martians",    value: "1" }
    - { key: "kernel.dmesg_restrict",             value: "1" }
    - { key: "fs.suid_dumpable",                  value: "0" }

# ── Firewall ─────────────────────────────────────────────────────────────────
- name: Enable UFW (Ubuntu)
  community.general.ufw:
    state: enabled
    policy: deny
  when: ansible_os_family == "Debian"

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Enable firewalld (CentOS)
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
  when: ansible_os_family == "RedHat"

# ── Fail2ban ──────────────────────────────────────────────────────────────────
- name: Configure fail2ban
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

# ── Logrotate ─────────────────────────────────────────────────────────────────
- name: Configure global logrotate
  ansible.builtin.template:
    src: logrotate.conf.j2
    dest: /etc/logrotate.d/enterprise-application-platform
    mode: "0644"

# ── MOTD ──────────────────────────────────────────────────────────────────────
- name: Set informative MOTD
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    mode: "0644"
